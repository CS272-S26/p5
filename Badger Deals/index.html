<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BadgerDeals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="bg-danger text-white p-3">
  <h1>BadgerDeals</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="deals.html">Deals</a>
    <a href="events.html">Events</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main class="container mt-4">
  <section>
    <h2>Welcome</h2>
    <p>Your hub for UW-Madison student deals, discounts, and events.</p>
  </section>

  <section class="row">
    <div class="col-md-6 card p-3">
      <h3>Find Deals</h3>
      <p>Browse discounts on food, merchandise, and more.</p>
    </div>

    <div class="col-md-6 card p-3">
      <h3>Campus Events</h3>
      <p>Discover events offering free items and promotions.</p>
    </div>
  </section>

  <section class="mt-4">
    <h2>Quick Savings Calculator</h2>

    <label for="price">Original Price ($):</label>
    <input id="price" type="number" class="form-control">

    <label for="discount">Discount (%):</label>
    <input id="discount" type="number" class="form-control">

    <button class="btn btn-danger mt-2" onclick="calculateSavings()">Calculate</button>

    <p id="result"></p>
  </section>
</main>

<footer class="bg-dark text-white text-center p-3 mt-4">
  <p>&copy; 2026 BadgerDeals</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
